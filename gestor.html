<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Midas - Painel Gestor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #111;
      color: #f0f0f0;
      min-height: 100vh;
    }

    header {
      background: #000;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid #FEAF00;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left .marca {
      font-size: 0.75rem;
      color: #FEAF00;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .header-left h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: white;
    }

    /* LOGIN */
    #tela-login {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 72px);
    }

    .login-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .login-box h2 {
      font-size: 1.1rem;
      color: #FEAF00;
      text-align: center;
    }

    .login-box p {
      font-size: 0.85rem;
      color: #888;
      text-align: center;
    }

    .login-erro {
      background: #3a1a1a;
      border: 1px solid #e74c3c;
      color: #e74c3c;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      display: none;
    }

    /* LAYOUT GESTOR */
    #tela-gestor { display: none; }

    .gestor-layout {
      display: flex;
      min-height: calc(100vh - 72px);
    }

    .gestor-sidebar {
      width: 280px;
      min-width: 280px;
      background: #1a1a1a;
      border-right: 1px solid #2a2a2a;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .gestor-sidebar h3 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #FEAF00;
      margin-bottom: 8px;
      margin-top: 16px;
      font-weight: 700;
    }

    .gestor-sidebar h3:first-child { margin-top: 0; }

    .emp-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      color: #ccc;
      transition: background 0.15s;
      border: 1px solid transparent;
    }

    .emp-item:hover { background: #222; }
    .emp-item.ativo { background: #222; border-color: #FEAF00; color: white; }

    .btn-novo-emp {
      margin-top: 8px;
      background: #FEAF00;
      color: #111;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      text-align: center;
    }

    .btn-novo-emp:hover { opacity: 0.85; }

    /* CONTEÚDO PRINCIPAL */
    .gestor-main {
      flex: 1;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
    }

    .secao {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px;
    }

    .secao-titulo {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #FEAF00;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-grid.cols-1 { grid-template-columns: 1fr; }

    .form-grupo {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-grupo label {
      font-size: 0.78rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-grupo input,
    .form-grupo select {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 12px;
      color: #f0f0f0;
      font-size: 0.9rem;
      transition: border-color 0.2s;
      outline: none;
    }

    .form-grupo input:focus,
    .form-grupo select:focus { border-color: #FEAF00; }

    .form-grupo select option { background: #1a1a1a; }

    .btn-salvar {
      background: #FEAF00;
      color: #111;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      align-self: flex-start;
    }

    .btn-salvar:hover { opacity: 0.85; }
    .btn-salvar:disabled { opacity: 0.4; cursor: not-allowed; }

    /* UNIDADES */
    .unidades-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .unidades-grade {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(56px, 1fr));
      gap: 8px;
      margin-bottom: 20px;
    }

    .unidade-card {
      aspect-ratio: 1;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      user-select: none;
      border: 2px solid transparent;
    }

    .unidade-card:hover { transform: scale(1.08); box-shadow: 0 4px 14px rgba(0,0,0,0.5); }
    .unidade-card.disponivel { background: #2ecc71; color: white; }
    .unidade-card.reservado  { background: #FEAF00; color: #111; }
    .unidade-card.vendido    { background: #e74c3c; color: white; }
    .unidade-card.selecionado { border-color: white; transform: scale(1.1); }

    .unidade-card .num   { font-size: 0.85rem; }
    .unidade-card .label { font-size: 0.58rem; opacity: 0.85; margin-top: 1px; }

    .btn-nova-unidade {
      background: transparent;
      border: 1px dashed #FEAF00;
      color: #FEAF00;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-nova-unidade:hover { background: #FEAF00; color: #111; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.ativo { display: flex; }

    .modal {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .modal-titulo {
      font-size: 1rem;
      font-weight: 700;
      color: #FEAF00;
    }

    .modal-acoes {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .btn-cancelar {
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-cancelar:hover { border-color: #888; color: #f0f0f0; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: #2ecc71;
      color: white;
      padding: 14px 24px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }

    .toast.erro { background: #e74c3c; }
    .toast.visivel { opacity: 1; transform: translateY(0); }

    .placeholder-vazio {
      color: #444;
      font-size: 0.9rem;
      text-align: center;
      padding: 40px;
    }

    @media (max-width: 768px) {
      .gestor-sidebar { display: none; }
      .gestor-main { padding: 16px; }
      .form-grid { grid-template-columns: 1fr; }
      .form-grid.cols-3 { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="marca">Midas Inteligência Imobiliária</span>
    <h1>Painel Gestor</h1>
  </div>
</header>

<!-- TELA DE LOGIN -->
<div id="tela-login">
  <div class="login-box">
    <h2>🔐 Acesso Restrito</h2>
    <p>Digite a senha para acessar o painel gestor</p>
    <div class="login-erro" id="login-erro">Senha incorreta. Tente novamente.</div>
    <div class="form-grupo">
      <label>Senha</label>
      <input type="password" id="input-senha" placeholder="••••••••" onkeydown="if(event.key==='Enter') fazerLogin()">
    </div>
    <button class="btn-salvar" onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<!-- TELA GESTOR -->
<div id="tela-gestor">
  <div class="gestor-layout">

    <aside class="gestor-sidebar">
      <h3>Empreendimentos</h3>
      <div id="lista-empreendimentos"></div>
      <button class="btn-novo-emp" onclick="abrirModalEmpreendimento()">+ Novo Empreendimento</button>
    </aside>

    <main class="gestor-main" id="gestor-main">
      <div class="placeholder-vazio">
        Selecione um empreendimento na lateral ou cadastre um novo.
      </div>
    </main>

  </div>
</div>

<!-- MODAL EMPREENDIMENTO -->
<div class="modal-overlay" id="modal-empreendimento">
  <div class="modal">
    <div class="modal-titulo" id="modal-emp-titulo">Novo Empreendimento</div>
    <div class="form-grid">
      <div class="form-grupo">
        <label>Nome do Empreendimento *</label>
        <input type="text" id="emp-nome" placeholder="Ex: Residencial Vila Aurora">
      </div>
      <div class="form-grupo">
        <label>Construtora *</label>
        <input type="text" id="emp-construtora" placeholder="Ex: MRV Engenharia">
      </div>
      <div class="form-grupo">
        <label>Cidade *</label>
        <input type="text" id="emp-cidade" placeholder="Ex: São Paulo">
      </div>
      <div class="form-grupo">
        <label>Bairro *</label>
        <input type="text" id="emp-bairro" placeholder="Ex: Vila Madalena">
      </div>
      <div class="form-grupo">
        <label>Tipo *</label>
        <select id="emp-tipo">
          <option value="">Selecione...</option>
          <option value="Residencial">Residencial</option>
          <option value="Comercial">Comercial</option>
          <option value="Misto">Misto</option>
        </select>
      </div>
    </div>
    <div class="modal-acoes">
      <button class="btn-cancelar" onclick="fecharModal('modal-empreendimento')">Cancelar</button>
      <button class="btn-salvar" id="btn-salvar-emp" onclick="salvarEmpreendimento()">Salvar Empreendimento</button>
    </div>
  </div>
</div>

<!-- MODAL UNIDADE -->
<div class="modal-overlay" id="modal-unidade">
  <div class="modal">
    <div class="modal-titulo" id="modal-und-titulo">Nova Unidade</div>
    <div class="form-grid cols-3">
      <div class="form-grupo">
        <label>Número/Nome da Unidade *</label>
        <input type="text" id="und-numero" placeholder="Ex: 101">
      </div>
      <div class="form-grupo">
        <label>Status *</label>
        <select id="und-status">
          <option value="disponivel">Disponível</option>
          <option value="reservado">Reservado</option>
          <option value="vendido">Vendido</option>
        </select>
      </div>
      <div class="form-grupo">
        <label>Valor (R$)</label>
        <input type="text" id="und-valor" placeholder="Ex: 350.000">
      </div>
      <div class="form-grupo">
        <label>Metragem (m²)</label>
        <input type="text" id="und-metragem" placeholder="Ex: 72">
      </div>
      <div class="form-grupo">
        <label>Quartos</label>
        <input type="number" id="und-quartos" placeholder="Ex: 2" min="0">
      </div>
      <div class="form-grupo">
        <label>Banheiros</label>
        <input type="number" id="und-banheiros" placeholder="Ex: 1" min="0">
      </div>
      <div class="form-grupo">
        <label>Suítes</label>
        <input type="number" id="und-suites" placeholder="Ex: 1" min="0">
      </div>
      <div class="form-grupo">
        <label>Rua</label>
        <input type="text" id="und-rua" placeholder="Ex: Rua das Flores">
      </div>
      <div class="form-grupo">
        <label>Número</label>
        <input type="text" id="und-numero-casa" placeholder="Ex: 42">
      </div>
    </div>
    <div class="form-grupo">
      <label>Observação</label>
      <input type="text" id="und-observacao" placeholder="Ex: Vista para o lago, andar alto...">
    </div>
    <div class="modal-acoes">
      <button class="btn-cancelar" onclick="fecharModal('modal-unidade')">Cancelar</button>
      <button class="btn-salvar" id="btn-salvar-und" onclick="salvarUnidade()">Salvar Unidade</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby7_w7xFBHm0XPTqtC8KmK39QNAHCXjUKC1XIEHzFQpzSeFZvyxOwAym5Lw8T53nIOBpA/exec";
  const SENHA = "midas2025";

  let empreendimentos = [];
  let empAtivo = null;
  let unidadeEditando = null;

  // ── LOGIN ──────────────────────────────────────────
  function fazerLogin() {
    const senha = document.getElementById("input-senha").value;
    if (senha === SENHA) {
      document.getElementById("tela-login").style.display = "none";
      document.getElementById("tela-gestor").style.display = "block";
      carregarEmpreendimentos();
    } else {
      document.getElementById("login-erro").style.display = "block";
    }
  }

  // ── EMPREENDIMENTOS ────────────────────────────────
  async function carregarEmpreendimentos() {
    try {
      const resp = await fetch(`${SCRIPT_URL}?acao=listarEmpreendimentos`);
      const dados = await resp.json();
      empreendimentos = dados.empreendimentos || [];
      renderListaEmpreendimentos();
    } catch (e) {
      mostrarToast("Erro ao carregar empreendimentos", true);
    }
  }

  function renderListaEmpreendimentos() {
    const lista = document.getElementById("lista-empreendimentos");
    lista.innerHTML = "";
    if (empreendimentos.length === 0) {
      lista.innerHTML = `<div style="color:#555;font-size:0.8rem;padding:8px 4px">Nenhum empreendimento cadastrado</div>`;
      return;
    }
    empreendimentos.forEach((emp, i) => {
      const div = document.createElement("div");
      div.className = "emp-item" + (empAtivo && empAtivo.nome === emp.nome ? " ativo" : "");
      div.textContent = emp.nome;
      div.onclick = () => selecionarEmpreendimento(emp);
      lista.appendChild(div);
    });
  }

  function selecionarEmpreendimento(emp) {
    empAtivo = emp;
    renderListaEmpreendimentos();
    carregarUnidades(emp);
  }

  function abrirModalEmpreendimento(emp = null) {
    document.getElementById("emp-nome").value = emp ? emp.nome : "";
    document.getElementById("emp-construtora").value = emp ? emp.construtora : "";
    document.getElementById("emp-cidade").value = emp ? emp.cidade : "";
    document.getElementById("emp-bairro").value = emp ? emp.bairro : "";
    document.getElementById("emp-tipo").value = emp ? emp.tipo : "";
    document.getElementById("modal-emp-titulo").textContent = emp ? "Editar Empreendimento" : "Novo Empreendimento";
    abrirModal("modal-empreendimento");
  }

  async function salvarEmpreendimento() {
    const nome = document.getElementById("emp-nome").value.trim();
    const construtora = document.getElementById("emp-construtora").value.trim();
    const cidade = document.getElementById("emp-cidade").value.trim();
    const bairro = document.getElementById("emp-bairro").value.trim();
    const tipo = document.getElementById("emp-tipo").value;

    if (!nome || !construtora || !cidade || !bairro || !tipo) {
      mostrarToast("Preencha todos os campos obrigatórios", true);
      return;
    }

    const btn = document.getElementById("btn-salvar-emp");
    btn.disabled = true;
    btn.textContent = "Salvando...";

    try {
      const resp = await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ acao: "cadastrarEmpreendimento", nome, construtora, cidade, bairro, tipo })
      });
      const dados = await resp.json();

      if (dados.sucesso) {
        fecharModal("modal-empreendimento");
        mostrarToast("Empreendimento salvo com sucesso!");
        await carregarEmpreendimentos();
        const novo = empreendimentos.find(e => e.nome === nome);
        if (novo) selecionarEmpreendimento(novo);
      } else {
        mostrarToast("Erro ao salvar: " + dados.erro, true);
      }
    } catch (e) {
      mostrarToast("Erro de conexão", true);
    }

    btn.disabled = false;
    btn.textContent = "Salvar Empreendimento";
  }

  // ── UNIDADES ───────────────────────────────────────
  async function carregarUnidades(emp) {
    const main = document.getElementById("gestor-main");
    main.innerHTML = `<div class="placeholder-vazio">Carregando unidades...</div>`;

    try {
      const resp = await fetch(`${SCRIPT_URL}?acao=listarUnidades&gid=${emp.gid}`);
      const dados = await resp.json();
      renderPainelEmpreendimento(emp, dados.unidades || []);
    } catch (e) {
      main.innerHTML = `<div class="placeholder-vazio">Erro ao carregar unidades.</div>`;
    }
  }

  function renderPainelEmpreendimento(emp, unidades) {
    const main = document.getElementById("gestor-main");

    const disp  = unidades.filter(u => normalizar(u.status) === "disponivel").length;
    const reserv = unidades.filter(u => normalizar(u.status) === "reservado").length;
    const vend  = unidades.filter(u => normalizar(u.status) === "vendido").length;

    main.innerHTML = `
      <div class="secao">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div class="secao-titulo" style="margin-bottom:0">${emp.nome}</div>
          <button class="btn-cancelar" style="font-size:0.78rem" onclick="abrirModalEmpreendimento(empAtivo)">✏️ Editar</button>
        </div>
        <div style="display:flex;gap:24px;font-size:0.82rem;color:#aaa;flex-wrap:wrap">
          <span>📍 ${emp.bairro}, ${emp.cidade}</span>
          <span>🏗️ ${emp.construtora}</span>
          <span>🏠 ${emp.tipo}</span>
          <span style="color:#2ecc71">● ${disp} disponíveis</span>
          <span style="color:#FEAF00">● ${reserv} reservados</span>
          <span style="color:#e74c3c">● ${vend} vendidos</span>
        </div>
      </div>

      <div class="secao">
        <div class="unidades-header">
          <div class="secao-titulo" style="margin-bottom:0">Unidades</div>
          <button class="btn-nova-unidade" onclick="abrirModalUnidade()">+ Nova Unidade</button>
        </div>
        <div class="unidades-grade" id="grade-unidades"></div>
      </div>
    `;

    const grade = document.getElementById("grade-unidades");

    if (unidades.length === 0) {
      grade.innerHTML = `<div class="placeholder-vazio" style="grid-column:1/-1">Nenhuma unidade cadastrada. Clique em "+ Nova Unidade" para começar.</div>`;
      return;
    }

    unidades.forEach(u => {
      const status = normalizar(u.status);
      const el = document.createElement("div");
      el.className = `unidade-card ${status}`;
      el.innerHTML = `<span class="num">${u.unidade}</span><span class="label">${labelStatus(status)}</span>`;
      el.onclick = () => abrirModalUnidade(u);
      grade.appendChild(el);
    });
  }

  function abrirModalUnidade(u = null) {
    unidadeEditando = u;
    document.getElementById("modal-und-titulo").textContent = u ? `Editar Unidade ${u.unidade}` : "Nova Unidade";
    document.getElementById("und-numero").value = u ? u.unidade : "";
    document.getElementById("und-numero").disabled = !!u;
    document.getElementById("und-status").value = u ? normalizar(u.status) : "disponivel";
    document.getElementById("und-valor").value = u ? u.valor : "";
    document.getElementById("und-metragem").value = u ? u.metragem : "";
    document.getElementById("und-quartos").value = u ? u.quartos : "";
    document.getElementById("und-banheiros").value = u ? u.banheiros : "";
    document.getElementById("und-suites").value = u ? u.suites : "";
    document.getElementById("und-rua").value = u ? u.rua : "";
    document.getElementById("und-numero-casa").value = u ? u.numero : "";
    document.getElementById("und-observacao").value = u ? u.observacao : "";
    abrirModal("modal-unidade");
  }

  async function salvarUnidade() {
    const numero = document.getElementById("und-numero").value.trim();
    const status = document.getElementById("und-status").value;

    if (!numero) {
      mostrarToast("Informe o número da unidade", true);
      return;
    }

    if (!empAtivo) {
      mostrarToast("Selecione um empreendimento", true);
      return;
    }

    const btn = document.getElementById("btn-salvar-und");
    btn.disabled = true;
    btn.textContent = "Salvando...";

    const payload = {
      acao: "cadastrarUnidade",
      empreendimento: empAtivo.nome,
      unidade: numero,
      status,
      valor: document.getElementById("und-valor").value.trim(),
      metragem: document.getElementById("und-metragem").value.trim(),
      quartos: document.getElementById("und-quartos").value.trim(),
      banheiros: document.getElementById("und-banheiros").value.trim(),
      suites: document.getElementById("und-suites").value.trim(),
      rua: document.getElementById("und-rua").value.trim(),
      numero: document.getElementById("und-numero-casa").value.trim(),
      observacao: document.getElementById("und-observacao").value.trim()
    };

    try {
      const resp = await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      });
      const dados = await resp.json();

      if (dados.sucesso) {
        fecharModal("modal-unidade");
        mostrarToast(dados.atualizado ? "Unidade atualizada!" : "Unidade cadastrada!");
        carregarUnidades(empAtivo);
      } else {
        mostrarToast("Erro: " + dados.erro, true);
      }
    } catch (e) {
      mostrarToast("Erro de conexão", true);
    }

    btn.disabled = false;
    btn.textContent = "Salvar Unidade";
  }

  // ── UTILITÁRIOS ────────────────────────────────────
  function normalizar(str) {
    if (!str) return "";
    return String(str).trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  }

  function labelStatus(status) {
    if (status === "disponivel") return "Livre";
    if (status === "reservado")  return "Reserv.";
    if (status === "vendido")    return "Vendido";
    return status;
  }

  function abrirModal(id) {
    document.getElementById(id).classList.add("ativo");
  }

  function fecharModal(id) {
    document.getElementById(id).classList.remove("ativo");
  }

  function mostrarToast(msg, erro = false) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast" + (erro ? " erro" : "") + " visivel";
    setTimeout(() => t.className = "toast" + (erro ? " erro" : ""), 3000);
  }

  // Fecha modal clicando fora
  document.querySelectorAll(".modal-overlay").forEach(overlay => {
    overlay.addEventListener("click", e => {
      if (e.target === overlay) overlay.classList.remove("ativo");
    });
  });
</script>
