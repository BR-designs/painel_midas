<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Midas - Painel de Disponibilidade</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #111111;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: #000000;
      color: white;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid #FEAF00;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left .marca {
      font-size: 0.75rem;
      color: #FEAF00;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .header-left h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: white;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #ultima-atualizacao {
      font-size: 0.8rem;
      color: #888;
    }

    #btn-filtros-mobile {
      display: none;
      background: #FEAF00;
      color: #111;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    .legenda {
      display: flex;
      gap: 20px;
      padding: 14px 32px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      flex-wrap: wrap;
    }

    .legenda-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: #aaa;
    }

    .bolinha { width: 14px; height: 14px; border-radius: 3px; }
    .disponivel-bg { background: #2ecc71; }
    .reservado-bg  { background: #FEAF00; }
    .vendido-bg    { background: #e74c3c; }

    .layout { display: flex; flex: 1; }

    .sidebar {
      width: 260px;
      min-width: 260px;
      background: #1a1a1a;
      border-right: 1px solid #2a2a2a;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      position: sticky;
      top: 72px;
      height: calc(100vh - 72px);
      overflow-y: auto;
    }

    .filtro-grupo h3 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #FEAF00;
      margin-bottom: 14px;
      font-weight: 700;
    }

    .filtro-grupo label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: #ccc;
      padding: 6px 4px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .filtro-grupo label:hover { background: #222; }

    .filtro-grupo input[type="checkbox"] {
      accent-color: #FEAF00;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .status-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    .btn-limpar {
      background: transparent;
      border: 1px solid #FEAF00;
      color: #FEAF00;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      font-weight: 600;
    }

    .btn-limpar:hover { background: #FEAF00; color: #111; }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
    }

    .sidebar-overlay.ativo { display: block; }

    .container {
      flex: 1;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      overflow-y: auto;
    }

    .loading {
      color: #555;
      font-size: 0.95rem;
      padding: 40px;
      text-align: center;
    }

    .empreendimento {
      background: #1a1a1a;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      overflow: hidden;
      border: 1px solid #2a2a2a;
    }

    .emp-header {
      background: #000000;
      color: white;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #FEAF00;
      flex-wrap: wrap;
      gap: 8px;
    }

    .emp-header h2 { font-size: 1rem; font-weight: 600; }

    .emp-resumo {
      display: flex;
      gap: 16px;
      font-size: 0.78rem;
      color: #aaa;
      flex-wrap: wrap;
    }

    .emp-resumo span { display: flex; align-items: center; gap: 5px; }

    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

    .grade {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
      gap: 10px;
    }

    .unidade {
      aspect-ratio: 1;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: default;
      transition: transform 0.15s, box-shadow 0.15s;
      user-select: none;
    }

    .unidade:hover { transform: scale(1.08); box-shadow: 0 4px 14px rgba(0,0,0,0.5); }
    .unidade.disponivel { background: #2ecc71; color: white; }
    .unidade.reservado  { background: #FEAF00; color: #111; }
    .unidade.vendido    { background: #e74c3c; color: white; }
    .unidade.oculto     { opacity: 0.12; transform: none !important; }

    .unidade .num   { font-size: 0.85rem; }
    .unidade .label { font-size: 0.6rem; opacity: 0.85; margin-top: 2px; }

    @media (max-width: 768px) {
      #btn-filtros-mobile { display: block; }

      .sidebar {
        position: fixed;
        top: 0;
        left: -280px;
        height: 100vh;
        z-index: 300;
        transition: left 0.3s ease;
        padding-top: 60px;
      }

      .sidebar.aberta { left: 0; }
      .container { padding: 16px; }
      .legenda { padding: 12px 16px; }
      header { padding: 14px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="marca">Midas Inteligência Imobiliária</span>
    <h1>Painel de Disponibilidade</h1>
  </div>
  <div class="header-right">
    <span id="ultima-atualizacao">Carregando...</span>
    <button id="btn-filtros-mobile" onclick="toggleSidebar()">⚙ Filtros</button>
  </div>
</header>

<div class="legenda">
  <div class="legenda-item"><div class="bolinha disponivel-bg"></div> Disponível</div>
  <div class="legenda-item"><div class="bolinha reservado-bg"></div> Reservado</div>
  <div class="legenda-item"><div class="bolinha vendido-bg"></div> Vendido</div>
</div>

<div class="layout">
  <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="filtro-grupo">
      <h3>Empreendimentos</h3>
      <div id="filtros-empreendimentos"></div>
    </div>
    <div class="filtro-grupo">
      <h3>Disponibilidade</h3>
      <label>
        <input type="checkbox" checked data-status="disponivel" onchange="aplicarFiltros()">
        <span class="status-dot" style="background:#2ecc71"></span> Disponível
      </label>
      <label>
        <input type="checkbox" checked data-status="reservado" onchange="aplicarFiltros()">
        <span class="status-dot" style="background:#FEAF00"></span> Reservado
      </label>
      <label>
        <input type="checkbox" checked data-status="vendido" onchange="aplicarFiltros()">
        <span class="status-dot" style="background:#e74c3c"></span> Vendido
      </label>
    </div>
    <button class="btn-limpar" onclick="limparFiltros()">Limpar filtros</button>
  </aside>

  <div class="container" id="painel">
    <div class="loading">Carregando dados da planilha...</div>
  </div>
</div>

<script>
  const SHEET_ID = "1wRorFx_SCPnQM2yEvkpWcF4pw9inoh0PjsFGszB7gi4";

  const ABAS = [
    { nome: "Residencial Vila Aurora",   gid: 0 },
    { nome: "Condomínio Jardins do Sul", gid: 282558123 },
    { nome: "Parque das Flores",         gid: 401574893 },
  ];

  let dadosEmpreendimentos = [];

  async function carregarAba(aba) {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${aba.gid}`;
    const resp = await fetch(url);
    const texto = await resp.text();
    const linhas = texto.trim().split("\n").slice(1);
    const unidades = linhas
      .map(l => l.replace(/"/g, "").split(","))
      .filter(cols => cols[0] && cols[1] && cols[1].trim() !== "")
      .map(cols => ({
        numero: cols[0].trim(),
        status: cols[1].trim().toLowerCase()
      }));
    return { nome: aba.nome, unidades };
  }

  async function carregarTodos() {
    try {
      dadosEmpreendimentos = await Promise.all(ABAS.map(carregarAba));
      renderPainel();
      renderFiltrosEmpreendimentos();
    } catch (e) {
      document.getElementById("painel").innerHTML =
        `<div class="loading">Erro ao carregar dados. Verifique se a planilha está publicada na web.</div>`;
    }
  }

  function labelStatus(status) {
    if (status === "disponivel") return "Livre";
    if (status === "reservado")  return "Reserv.";
    if (status === "vendido")    return "Vendido";
    return status;
  }

  function contarStatus(unidades) {
    return unidades.reduce((acc, u) => {
      acc[u.status] = (acc[u.status] || 0) + 1;
      return acc;
    }, {});
  }

  function renderPainel() {
    const painel = document.getElementById("painel");
    painel.innerHTML = "";

    dadosEmpreendimentos.forEach((emp, i) => {
      if (emp.unidades.length === 0) return;

      const contagem = contarStatus(emp.unidades);
      const disp  = contagem.disponivel || 0;
      const reserv = contagem.reservado  || 0;
      const vend  = contagem.vendido    || 0;

      const div = document.createElement("div");
      div.className = "empreendimento";
      div.dataset.empIndex = i;

      div.innerHTML = `
        <div class="emp-header">
          <h2>${emp.nome}</h2>
          <div class="emp-resumo">
            <span><span class="dot" style="background:#2ecc71"></span> ${disp} disponíveis</span>
            <span><span class="dot" style="background:#FEAF00"></span> ${reserv} reservados</span>
            <span><span class="dot" style="background:#e74c3c"></span> ${vend} vendidos</span>
          </div>
        </div>
        <div class="grade"></div>
      `;

      painel.appendChild(div);

      const grade = div.querySelector(".grade");
      emp.unidades.forEach(u => {
        const el = document.createElement("div");
        el.className = `unidade ${u.status}`;
        el.dataset.status = u.status;
        el.innerHTML = `<span class="num">${u.numero}</span><span class="label">${labelStatus(u.status)}</span>`;
        grade.appendChild(el);
      });
    });

    atualizarTimestamp();
    aplicarFiltros();
  }

  function renderFiltrosEmpreendimentos() {
    const container = document.getElementById("filtros-empreendimentos");
    container.innerHTML = "";
    dadosEmpreendimentos.forEach((emp, i) => {
      if (emp.unidades.length === 0) return;
      const label = document.createElement("label");
      label.innerHTML = `
        <input type="checkbox" checked data-emp="${i}" onchange="aplicarFiltros()">
        ${emp.nome}
      `;
      container.appendChild(label);
    });
  }

  function aplicarFiltros() {
    const statusAtivos = Array.from(
      document.querySelectorAll("[data-status]")
    ).filter(el => el.checked).map(el => el.dataset.status);

    const empsAtivos = Array.from(
      document.querySelectorAll("[data-emp]")
    ).filter(el => el.checked).map(el => parseInt(el.dataset.emp));

    document.querySelectorAll(".empreendimento").forEach((card, i) => {
      if (empsAtivos.includes(i)) {
        card.style.display = "";
        card.querySelectorAll(".unidade").forEach(u => {
          u.classList.toggle("oculto", !statusAtivos.includes(u.dataset.status));
        });
      } else {
        card.style.display = "none";
      }
    });
  }

  function limparFiltros() {
    document.querySelectorAll("[data-status], [data-emp]").forEach(el => {
      el.checked = true;
    });
    aplicarFiltros();
  }

  function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("aberta");
    document.getElementById("overlay").classList.toggle("ativo");
  }

  function atualizarTimestamp() {
    const agora = new Date();
    const hora = agora.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
    document.getElementById("ultima-atualizacao").textContent = `Atualizado às ${hora}`;
  }

  carregarTodos();
  setInterval(carregarTodos, 30000);
</script>

</body>
</html>
